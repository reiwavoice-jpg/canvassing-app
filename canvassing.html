<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>個別訪問記録</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      margin: 0; padding: 0;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif;
    }

    /*
      iOSでは body に position:fixed を当てても正しく機能しない。
      ラッパーdiv (#app) に当てることでビューポートにピッタリ合わせる。
    */
    #app {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f0f2f5;
    }

    /* ===== ヘッダー ===== */
    #header {
      background: linear-gradient(135deg, #1a2c5b 0%, #2d4a9e 100%);
      color: white;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 600;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #header h1 { font-size: 14px; font-weight: 700; }
    #stats-bar { display: flex; gap: 16px; }
    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-value { font-size: 19px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 10px; opacity: 0.75; }

    /* ===== 地図エリア（flex: 1 で残りを使う） ===== */
    #map-wrap {
      flex: 1;
      position: relative;
      min-height: 100px;
      overflow: hidden;
    }
    #map { width: 100%; height: 100%; }

    /* GPS FAB */
    #gps-fab {
      position: absolute;
      bottom: 10px; right: 12px;
      width: 42px; height: 42px;
      background: white;
      border: none; border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      font-size: 20px; cursor: pointer;
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
    }

    /* ===== 下部固定パネル ===== */
    #bottom-panel {
      height: 52vh;
      background: white;
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -3px 16px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      z-index: 600;
    }

    .panel-handle {
      width: 36px; height: 4px;
      background: #ddd; border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    /* パネルビュー切替 */
    .panel-view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    .panel-view.active { display: flex; }


    /* ===== IDLEパネル ===== */
    #panel-idle {
      padding: 10px 16px 14px;
      gap: 8px; /* ボタン間の隙間 */
      /* display/flex-direction は .panel-view.active から継承 */
    }
    .idle-hint {
      font-size: 11px; color: #aaa;
      text-align: center;
      flex-shrink: 0;
    }
    /* 3ボタン共通 — flex:1 で縦を3等分 */
    .idle-btn {
      flex: 1;
      width: 100%;
      min-height: 0;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      letter-spacing: 0.02em;
    }
    .idle-btn:active { opacity: 0.82; }
    .idle-main {
      background: #1a2c5b; color: white;
      border: none; font-size: 18px;
    }
    .idle-sub {
      background: white; color: #1a2c5b;
      border: 2px solid #1a2c5b; font-size: 15px;
    }
    .idle-end {
      background: white; color: #546E7A;
      border: 2px solid #546E7A; font-size: 15px;
    }


    /* ===== FORMパネル ===== */
    #panel-form {
      overflow: hidden;
      /* スクロールはパネル内のdivで制御。ここでoverflow:autoを
         設定すると二重スクロールが発生するため hidden にする。 */
    }
    .panel-title {
      font-size: 15px; font-weight: 700;
      color: #1a2c5b; margin-bottom: 10px;
      flex-shrink: 0;
    }

    /* コンパクトフォーム */
    .form-row {
      display: flex; gap: 8px; margin-bottom: 8px;
    }
    .form-cell { flex: 1; min-width: 0; }
    .form-cell.wide { flex: 2; }

    .form-label {
      display: block; font-size: 11px;
      font-weight: 600; color: #666; margin-bottom: 3px;
    }
    .form-input {
      width: 100%;
      padding: 16px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      -webkit-appearance: none; appearance: none;
      background: white;
      transition: border-color 0.2s;
    }
    /* 住所・名前の縦幅（結果ボタン以上） */
    #f-address, #f-name {
      min-height: 68px;
    }
    .form-input:focus { outline: none; border-color: #1a2c5b; }

    /* iOS/Android: 全inputで16px強制（自動ズーム防止） */
    input, select, textarea {
      font-size: 16px !important;
      touch-action: manipulation; /* ダブルタップズーム無効 */
    }
    button, a {
      touch-action: manipulation; /* ボタンのダブルタップズームも無効 */
    }

    /* 訪問結果ボタン（5個・各ボタンは全体の約1/10幅、右側は空白） */
    .result-section { margin-bottom: 8px; }
    .result-grid {
      display: flex;
      gap: 4px;
    }
    .result-btn {
      flex: 0 0 auto;
      width: calc((100% - 4 * 4px) / 10); /* 全幅の1/10 ≒ 従来の半分 */
      padding: 10px 2px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background: white;
      font-size: 11px; font-weight: 600;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      transition: all 0.15s;
    }
    .result-btn .em { font-size: 18px; }
    .result-btn.sel-在宅 { background:#E3F2FD; border-color:#2196F3; color:#1565C0; }
    .result-btn.sel-不在 { background:#FFF3E0; border-color:#FF9800; color:#E65100; }
    .result-btn.sel-支持 { background:#E8F5E9; border-color:#43A047; color:#1B5E20; }
    .result-btn.sel-反対 { background:#FFEBEE; border-color:#E53935; color:#B71C1C; }
    .result-btn.sel-中立 { background:#F5F5F5; border-color:#9E9E9E; color:#424242; }

    /* フォームフッター（スクロールしても常に表示） */
    .form-footer {
      display: flex; gap: 8px;
      padding: 8px 0 4px;
      position: sticky; bottom: 0;
      background: white;
    }
    .btn {
      flex: 1;
      padding: 13px 6px;
      border: none; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .btn:active { opacity: 0.8; }
    .btn-success { background: #43A047; color: white; }
    .btn-outline { background: white; color: #1a2c5b; border: 2px solid #1a2c5b; flex: 0.6; }
    .btn:disabled { opacity: 0.5; }


    /* ===== HISTORYパネル ===== */
    #panel-history { overflow: hidden; }
    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 6px;
      flex-shrink: 0;
    }
    .history-header-title {
      font-size: 15px; font-weight: 700; color: #1a2c5b;
    }
    .history-close-btn {
      padding: 6px 14px;
      border: 2px solid #1a2c5b;
      border-radius: 10px;
      background: white; color: #1a2c5b;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }
    #history-content {
      overflow-y: auto;
      flex: 1;
      padding: 4px 14px 12px;
    }

    /* 集計カード */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px; margin-bottom: 10px;
    }
    .stats-card {
      text-align: center; padding: 8px 2px;
      background: #f9f9f9; border-radius: 10px;
    }
    .stats-card .sc-em  { font-size: 16px; }
    .stats-card .sc-num { font-size: 18px; font-weight: 700; }
    .stats-card .sc-lbl { font-size: 10px; color: #888; }

    /* 履歴リスト */
    .hist-item { padding: 9px 0; border-bottom: 1px solid #f0f0f0; }
    .hist-row1 { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .hist-result-em  { font-size: 16px; }
    .hist-result-lbl { font-size: 13px; font-weight: 700; }
    .hist-name  { color: #555; font-size: 12px; }
    .hist-addr  { color: #888; font-size: 11px; }
    .hist-memo  { color: #666; font-size: 11px; margin-top: 2px; }


    /* ===== トースト ===== */
    #toast {
      position: fixed;
      bottom: 90px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.82);
      color: white;
      padding: 11px 20px;
      border-radius: 25px;
      font-size: 14px;
      z-index: 2000;
      display: none;
      white-space: nowrap;
      max-width: 90vw; text-align: center;
    }

    /* ===================================================================
       フォームオーバーレイ
       #app（position:fixed + overflow:hidden）の外に置くことで
       overflow-y:auto の scrollable context になり、
       iOSがズームではなくスクロールでinputを見せるようになる
       =================================================================== */
    #form-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #f8f9fa;
      z-index: 5000;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .fo-header {
      position: sticky; top: 0;
      background: linear-gradient(135deg, #1a2c5b 0%, #2d4a9e 100%);
      color: white; padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      flex-shrink: 0;
    }
    .fo-back-btn {
      background: rgba(255,255,255,0.2); border: none;
      border-radius: 8px; color: white;
      font-size: 13px; font-weight: 600;
      padding: 8px 12px; cursor: pointer;
    }
    .fo-header-title { font-size: 15px; font-weight: 700; }
    .fo-spacer { width: 82px; }
    .fo-body { padding: 16px 16px 60px; }

    /* ===== ローディング ===== */
    #loading {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.94);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 3000;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 4px solid #e0e0e0;
      border-top-color: #1a2c5b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { margin-top: 12px; color: #666; font-size: 14px; }
  </style>
</head>

<body>
<div id="app">

<!-- ローディング -->
<div id="loading">
  <div class="spinner"></div>
  <p>GPSと地図を読み込み中...</p>
</div>

<!-- ヘッダー -->
<div id="header">
  <h1>🏘️ 個別訪問記録</h1>
  <div id="stats-bar">
    <div class="stat-item">
      <span class="stat-value" id="stat-visits">0</span>
      <span class="stat-label">訪問件数</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="stat-dist">0m</span>
      <span class="stat-label">歩行距離</span>
    </div>
  </div>
</div>

<!-- 地図エリア -->
<div id="map-wrap">
  <div id="map"></div>
  <button id="gps-fab" onclick="centerOnMe()">📍</button>
</div>

<!-- 下部固定パネル -->
<div id="bottom-panel">
  <div class="panel-handle"></div>

  <!-- ======== IDLE ======== -->
  <div id="panel-idle" class="panel-view active">
    <p class="idle-hint">訪問先に着いたらタップして記録</p>
    <button class="idle-btn idle-main" onclick="openFormOverlay()">
      ＋ 訪問記録を入力
    </button>
    <button class="idle-btn idle-sub" onclick="showPanel('history')">
      📋 本日の記録
    </button>
    <button class="idle-btn idle-end" onclick="endSession()">
      終了
    </button>
  </div>

  <!-- ======== FORM（フォーム入力はオーバーレイに移行済み） ======== -->
  <!-- panel-form は空のまま残す（showPanel の参照エラー防止） -->
  <div id="panel-form" class="panel-view"></div>

  <!-- ======== HISTORY ======== -->
  <div id="panel-history" class="panel-view">
    <div class="history-header">
      <span class="history-header-title">📋 本日の訪問記録</span>
      <button class="history-close-btn" onclick="showPanel('idle')">閉じる</button>
    </div>
    <div id="history-content"></div>
  </div>

</div><!-- /bottom-panel -->

<!-- トースト -->
<div id="toast"></div>

</div><!-- /app -->

<!-- ========================================================
     フォームオーバーレイ（#appの外 → overflow-y:auto でiOS zoom防止）
     ======================================================== -->
<div id="form-overlay">
  <!-- sticky ヘッダー -->
  <div class="fo-header">
    <button class="fo-back-btn" onclick="closeFormOverlay()">← キャンセル</button>
    <span class="fo-header-title">📝 訪問記録を入力</span>
    <div class="fo-spacer"></div>
  </div>

  <!-- フォーム本体 -->
  <div class="fo-body">

    <!-- 住所（フル幅） -->
    <div class="form-row">
      <div class="form-cell">
        <label class="form-label">住所 <span style="color:#E53935">*</span></label>
        <input type="text" id="f-address" class="form-input" placeholder="GPS取得中..." style="font-size:16px;min-height:56px">
      </div>
    </div>

    <!-- お名前（フル幅） -->
    <div class="form-row">
      <div class="form-cell">
        <label class="form-label">お名前</label>
        <input type="text" id="f-name" class="form-input" placeholder="田中 太郎" style="font-size:16px;min-height:56px">
      </div>
    </div>

    <!-- 世帯人数（半幅） -->
    <div class="form-row">
      <div class="form-cell" style="max-width:55%">
        <label class="form-label">世帯人数</label>
        <select id="f-household" class="form-input" style="font-size:16px">
          <option value="">選択してください</option>
          <option>1人</option>
          <option>2人</option>
          <option>3人</option>
          <option>4人</option>
          <option>5人以上</option>
        </select>
      </div>
    </div>

    <!-- 訪問結果 -->
    <div class="result-section">
      <label class="form-label">訪問結果 <span style="color:#E53935">*</span></label>
      <div class="result-grid">
        <button class="result-btn" onclick="selectResult('在宅')">
          <span class="em">👋</span>在宅
        </button>
        <button class="result-btn" onclick="selectResult('不在')">
          <span class="em">🚪</span>不在
        </button>
        <button class="result-btn" onclick="selectResult('支持')">
          <span class="em">✅</span>支持
        </button>
        <button class="result-btn" onclick="selectResult('反対')">
          <span class="em">❌</span>反対
        </button>
        <button class="result-btn" onclick="selectResult('中立')">
          <span class="em">😐</span>中立
        </button>
      </div>
    </div>

    <!-- メモ -->
    <div class="form-row">
      <div class="form-cell">
        <label class="form-label">メモ・会話内容</label>
        <textarea id="f-memo" class="form-input" rows="3"
          placeholder="住民の意見・特記事項など"
          style="resize:none;font-size:16px"></textarea>
      </div>
    </div>

    <!-- 送信ボタン -->
    <div style="margin-top:16px">
      <button id="submit-btn" class="btn btn-success" onclick="submitVisit()"
        style="width:100%;padding:16px;font-size:16px;border-radius:14px">
        記録する ✓
      </button>
    </div>

  </div><!-- /fo-body -->
</div><!-- /form-overlay -->

<!-- LIFF SDK（LINEアプリ内WebViewでiOS zoomを防ぐため） -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ============================================================
// 設定
// ============================================================
// ★ LINE DevelopersコンソールでLIFFを登録後、以下に入力してください
var LIFF_ID  = '2009413587-0Plg0ecV';
// GAS APIのURL（データ保存・取得用）
var GAS_URL  = 'https://script.google.com/macros/s/AKfycbxjjLVWPU06BgmwtYrnyjC8LIuV54mzG0YMa_SkWuL5yN8y6m9GEbM_C0cRtX7UlWOM/exec';

// userId: LIFF経由のときはinitLIFF()で上書きされる
// 直接URLアクセス時はGASテンプレートのuserIdがフォールバックとして使われる
// GitHub Pages ホスティング用: userIdはURLパラメータから取得（LIFFで上書き）
var USER_ID = (function() {
  var p = new URLSearchParams(window.location.search);
  return p.get('userId') || '';
})();
var DEFAULT_LAT  = 35.4849;
var DEFAULT_LNG  = 139.4081;

// ============================================================
// 状態
// ============================================================
var map;
var myMarker   = null;
var myCircle   = null;
var gpsWatchId = null;
var currentLat = null;
var currentLng = null;
var walkingPath    = [];
var totalDistance  = 0;
var visitCount     = 0;
var sessionVisits  = [];
var selectedResult = '';

var RESULT_EMOJI = { '在宅':'👋','不在':'🚪','支持':'✅','反対':'❌','中立':'😐' };
var RESULT_COLOR = { '在宅':'#2196F3','不在':'#FF9800','支持':'#43A047','反対':'#E53935','中立':'#9E9E9E' };

// ============================================================
// パネル切替（idle / history のみ。form はオーバーレイで対応）
// ============================================================
function showPanel(name) {
  if (document.activeElement) document.activeElement.blur();
  document.querySelectorAll('.panel-view').forEach(function(v) {
    v.classList.remove('active');
  });
  var target = document.getElementById('panel-' + name);
  if (target) target.classList.add('active');
  if (name === 'history') loadAndShowHistory();
}

// ============================================================
// フォームオーバーレイ（iOS zoom 対策: #app外の overflow-y:auto コンテナ）
// ============================================================
function openFormOverlay() {
  // フォームリセット
  document.getElementById('f-address').value   = '';
  document.getElementById('f-name').value      = '';
  document.getElementById('f-household').value = '';
  document.getElementById('f-memo').value      = '';
  selectedResult = '';
  document.querySelectorAll('.result-btn').forEach(function(b) {
    b.className = 'result-btn';
  });
  var btn = document.getElementById('submit-btn');
  btn.disabled = false;
  btn.textContent = '記録する ✓';

  // オーバーレイを表示（先頭にスクロール）
  var overlay = document.getElementById('form-overlay');
  overlay.scrollTop = 0;
  overlay.style.display = 'block';

  // GPS住所を自動入力
  if (currentLat !== null) {
    reverseGeocode(currentLat, currentLng, function(addr) {
      document.getElementById('f-address').value = addr;
    });
  }
}

function resetViewportZoom() {
  // iOSズームリセットのコツ:
  // ① まずblur（キーボード非表示・フォーカス解除）
  // ② 100ms待機後に initial-scale=1.000001 に変更（変化を検知させる）
  // ③ さらに300ms待機後に1.0に戻す（ピンチ操作を復活）
  if (document.activeElement) document.activeElement.blur();
  var vp = document.querySelector('meta[name=viewport]');
  if (!vp) return;
  setTimeout(function() {
    vp.setAttribute('content', 'width=device-width, initial-scale=1.000001, maximum-scale=1.000001, user-scalable=no');
    setTimeout(function() {
      vp.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes');
    }, 300);
  }, 100);
}

function closeFormOverlay() {
  document.getElementById('form-overlay').style.display = 'none';
  resetViewportZoom();
}

// ============================================================
// 初期化
// ============================================================
function init() {
  initMap();
  startGPS();
  loadVisitHistory();
  setTimeout(function() {
    document.getElementById('loading').style.display = 'none';
  }, 1800);
}

// ============================================================
// 地図初期化
// ============================================================
function initMap() {
  map = L.map('map', {
    center: [DEFAULT_LAT, DEFAULT_LNG],
    zoom: 16,
    zoomControl: true
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);
}

// ============================================================
// GPS追跡
// ============================================================
function startGPS() {
  if (!navigator.geolocation) {
    showToast('このブラウザはGPSに対応していません');
    return;
  }
  gpsWatchId = navigator.geolocation.watchPosition(
    onPosition, onPositionError,
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 4000 }
  );
}

function onPosition(pos) {
  var lat = pos.coords.latitude;
  var lng = pos.coords.longitude;
  var acc = pos.coords.accuracy;

  if (acc > 30) return; // 精度30m以上はスキップ

  if (currentLat !== null) {
    var d = haversine(currentLat, currentLng, lat, lng);
    if (d >= 3 && d < 500) {
      totalDistance += d;
      walkingPath.push([lat, lng]);
      updateHeader();
    }
  } else {
    map.setView([lat, lng], 17);
    walkingPath.push([lat, lng]);
  }

  currentLat = lat;
  currentLng = lng;

  if (myMarker) {
    myMarker.setLatLng([lat, lng]);
    myCircle.setLatLng([lat, lng]).setRadius(acc);
  } else {
    myCircle = L.circle([lat, lng], {
      radius: acc, color: '#2196F3',
      fillColor: '#2196F3', fillOpacity: 0.1, weight: 1
    }).addTo(map);
    myMarker = L.circleMarker([lat, lng], {
      radius: 9, color: 'white', weight: 3,
      fillColor: '#2196F3', fillOpacity: 1
    }).addTo(map).bindPopup('現在地');
  }
}

function onPositionError(err) {
  if (err.code === 1) {
    showToast('位置情報の許可が必要です。ブラウザ設定を確認してください。');
  } else {
    showToast('GPS取得エラー。屋外に出てお試しください。');
  }
}

function centerOnMe() {
  if (currentLat !== null) {
    map.setView([currentLat, currentLng], 17);
  } else {
    showToast('GPS取得中です。少し待ってください...');
  }
}

// ============================================================
// 過去の訪問履歴をマップに表示
// ============================================================
function loadVisitHistory() {
  gasAPI({ action: 'getVisitHistory', userId: USER_ID })
    .then(function(res) {
      if (res && res.records) {
        res.records.forEach(addMarker);
      }
    })
    .catch(function(e) { console.error('loadVisitHistory:', e); });
}

function addMarker(v) {
  if (!v.lat || !v.lng) return;
  var color = RESULT_COLOR[v.result] || '#9E9E9E';
  var icon  = L.divIcon({
    html: '<div style="width:13px;height:13px;background:' + color + ';border:2.5px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>',
    iconSize: [13,13], iconAnchor: [6,6], className: ''
  });
  var popup = '<div style="font-size:13px;min-width:140px">'
    + '<strong>' + (RESULT_EMOJI[v.result]||'📍') + ' ' + (v.result||'未記録') + '</strong><br>'
    + (v.address||'') + '<br>'
    + (v.residentName ? '👤 ' + v.residentName : '')
    + (v.memo ? '<br>📝 ' + v.memo.slice(0,50) : '')
    + '</div>';
  L.marker([v.lat, v.lng], { icon: icon })
    .addTo(map)
    .bindPopup(popup);
}

// ============================================================
// 訪問結果選択
// ============================================================
function selectResult(r) {
  selectedResult = r;
  document.querySelectorAll('.result-btn').forEach(function(b) {
    b.className = 'result-btn';
    if (b.textContent.includes(r)) b.classList.add('sel-' + r);
  });
}

// ============================================================
// ============================================================
// GAS API 共通呼び出し（fetch + GETパラメータ）
// GASのContentServiceはCORS(Access-Control-Allow-Origin:*)を自動付与する
// ============================================================
function gasAPI(params) {
  var qs = Object.keys(params).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  return fetch(GAS_URL + '?' + qs)
    .then(function(r) { return r.json(); });
}

// 訪問記録保存
// ============================================================
function submitVisit() {
  var address   = document.getElementById('f-address').value.trim();
  var name      = document.getElementById('f-name').value.trim();
  var household = document.getElementById('f-household').value;
  var memo      = document.getElementById('f-memo').value.trim();

  if (!address)        { showToast('住所を入力してください'); return; }
  if (!selectedResult) { showToast('訪問結果を選択してください'); return; }

  var data = {
    address:         address,
    lat:             currentLat || '',
    lng:             currentLng || '',
    residentName:    name,
    householdSize:   household,
    result:          selectedResult,
    memo:            memo,
    walkingDistance: Math.round(totalDistance),
    userId:          USER_ID
  };

  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  var params = { action: 'saveVisit' };
  Object.keys(data).forEach(function(k) { params[k] = data[k]; });

  gasAPI(params)
    .then(function(res) {
      btn.disabled = false;
      btn.textContent = '記録する ✓';
      if (res.success) {
        visitCount++;
        sessionVisits.push(data);
        updateHeader();
        addMarker({
          lat: data.lat, lng: data.lng,
          address: data.address,
          residentName: data.residentName,
          result: data.result, memo: data.memo
        });
        showToast('✅ 訪問記録を保存しました！');
        closeFormOverlay();
      } else {
        showToast('保存エラー: ' + (res.error || '不明'));
      }
    })
    .catch(function(e) {
      btn.disabled = false;
      btn.textContent = '記録する ✓';
      showToast('通信エラーが発生しました');
      console.error(e);
    });
}

// ============================================================
// 本日の記録表示
// ============================================================
function loadAndShowHistory() {
  var container = document.getElementById('history-content');
  container.innerHTML = '<p style="color:#aaa;text-align:center;padding:20px 0">読み込み中...</p>';

  gasAPI({ action: 'getTodayVisits', userId: USER_ID })
    .then(function(res) {
      renderHistory(res && res.records ? res.records : []);
    })
    .catch(function(e) {
      console.error('getTodayVisits error:', e);
      renderHistory(sessionVisits);
    });
}

function renderHistory(records) {
  var container = document.getElementById('history-content');
  if (!records || records.length === 0) {
    container.innerHTML = '<p style="color:#aaa;text-align:center;padding:20px 0">本日の記録はまだありません</p>';
    return;
  }

  var stats = { '支持':0,'反対':0,'在宅':0,'不在':0,'中立':0 };
  records.forEach(function(v) {
    if (stats.hasOwnProperty(v.result)) stats[v.result]++;
  });

  var html = '<div class="stats-grid">';
  Object.keys(stats).forEach(function(k) {
    html += '<div class="stats-card">'
      + '<div class="sc-em">' + RESULT_EMOJI[k] + '</div>'
      + '<div class="sc-num">' + stats[k] + '</div>'
      + '<div class="sc-lbl">' + k + '</div>'
      + '</div>';
  });
  html += '</div><div>';

  records.slice().reverse().forEach(function(v) {
    html += '<div class="hist-item">'
      + '<div class="hist-row1">'
      + '<span class="hist-result-em">' + (RESULT_EMOJI[v.result]||'📍') + '</span>'
      + '<span class="hist-result-lbl">' + v.result + '</span>'
      + (v.residentName ? '<span class="hist-name">' + v.residentName + 'さん</span>' : '')
      + '</div>'
      + '<div class="hist-addr">📍 ' + (v.address||'GPS未取得') + '</div>'
      + (v.memo ? '<div class="hist-memo">📝 ' + v.memo.slice(0,60) + '</div>' : '')
      + '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

// ============================================================
// セッション終了
// ============================================================
function endSession() {
  var distStr = formatDist(totalDistance);
  var msg = visitCount > 0
    ? '本日の訪問: ' + visitCount + '件\n歩行距離: ' + distStr + '\n\n終了してLINEに報告しますか？'
    : '訪問記録がありません。終了しますか？';

  if (!confirm(msg)) return;

  if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId);

  if (visitCount === 0 || !USER_ID) {
    showToast('お疲れ様でした！');
    return;
  }

  var stats = { '支持':0,'反対':0,'在宅':0,'不在':0,'中立':0 };
  sessionVisits.forEach(function(v) {
    if (stats.hasOwnProperty(v.result)) stats[v.result]++;
  });

  var reportData = { totalVisits: visitCount, totalDistance: totalDistance };
  Object.keys(stats).forEach(function(k) { reportData[k] = stats[k]; });

  var params = { action: 'sendReport', userId: USER_ID };
  Object.keys(reportData).forEach(function(k) { params[k] = reportData[k]; });
  gasAPI(params)
    .then(function() { showToast('✅ LINEに報告しました！'); })
    .catch(function() { showToast('LINE報告に失敗しましたが、記録は保存されています'); });
}

// ============================================================
// 入力タップ時ズーム防止（iOS 15+ 対応）
// ・iOSは静的HTMLの maximum-scale=1.0 を無視するが
//   touchstart の瞬間に JS で書き換えると効く
// ・blur 後は maximum-scale を戻してピンチ操作を復活
// ============================================================
function setupZoomPrevention() {
  var viewport = document.querySelector('meta[name=viewport]');
  if (!viewport) return;

  var VP_LOCK   = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';
  var VP_NORMAL = 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes';

  // 入力欄タッチ開始 → ズームをロック（focusより先に発火するのがポイント）
  document.addEventListener('touchstart', function(e) {
    var tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
      viewport.setAttribute('content', VP_LOCK);
    }
  }, { passive: true });

  // フォーカスが外れた → ズームを解除（ピンチ操作を復活）
  document.addEventListener('focusout', function(e) {
    var tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
      setTimeout(function() {
        viewport.setAttribute('content', VP_NORMAL);
      }, 150);
    }
  });
}

// ============================================================
// キーボード対策（Visual Viewport API）
// ============================================================
function setupKeyboardFix() {
  if (!window.visualViewport) return;

  function onVVChange() {
    var formView = document.getElementById('panel-form');
    if (!formView.classList.contains('active')) return;

    var kbH = Math.max(0,
      window.innerHeight - window.visualViewport.height - window.visualViewport.offsetTop
    );

    var panel = document.getElementById('bottom-panel');
    if (kbH > 80) {
      // キーボード表示中: パネルをキーボードの上に移動
      panel.style.marginBottom = kbH + 'px';
    } else {
      panel.style.marginBottom = '';
    }

    // フォーカス中の要素をスクロールで表示
    var focused = document.activeElement;
    if (focused && formView.contains(focused)) {
      setTimeout(function() {
        focused.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }, 100);
    }
  }

  window.visualViewport.addEventListener('resize', onVVChange);
  window.visualViewport.addEventListener('scroll', onVVChange);
}

// ============================================================
// ユーティリティ
// ============================================================
function haversine(lat1, lng1, lat2, lng2) {
  var R    = 6371000;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2)
        + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180)
        * Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function reverseGeocode(lat, lng, callback) {
  var url = 'https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lng + '&format=json&accept-language=ja';
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var a = d.address || {};
      var result = '';
      if (a.city_district || a.suburb) result += (a.city_district || a.suburb);
      if (a.neighbourhood)  result += a.neighbourhood;
      if (a.road)           result += a.road;
      if (a.house_number)   result += a.house_number;
      callback(result || d.display_name || (lat.toFixed(5) + ', ' + lng.toFixed(5)));
    })
    .catch(function() {
      callback(lat.toFixed(5) + ', ' + lng.toFixed(5));
    });
}

function formatDist(m) {
  if (m < 1000) return Math.round(m) + 'm';
  return (m / 1000).toFixed(1) + 'km';
}

function updateHeader() {
  document.getElementById('stat-visits').textContent = visitCount;
  document.getElementById('stat-dist').textContent   = formatDist(totalDistance);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.style.display = 'none'; }, 3000);
}

// ============================================================
// 起動
// ============================================================
// ============================================================
// LIFF初期化（LINEアプリ内で開いたときにuserIdをLIFFから取得）
// ============================================================
function initLIFF() {
  if (typeof liff === 'undefined' || LIFF_ID === 'LIFF_ID_HERE') {
    // SDK未ロード or LIFF_ID未設定 → URL parameterのuserIdをそのまま使用
    return;
  }
  liff.init({ liffId: LIFF_ID })
    .then(function() {
      // LINEアプリ内 or ログイン済みの場合はプロフィール取得
      if (liff.isInClient() || liff.isLoggedIn()) {
        return liff.getProfile();
      }
      return null;
    })
    .then(function(profile) {
      if (profile && profile.userId) {
        USER_ID = profile.userId;
        console.log('LIFF userId 取得成功:', USER_ID);
      }
    })
    .catch(function(err) {
      // LIFF失敗してもアプリは動く（URL parameterのuserIdにフォールバック）
      console.warn('LIFF init 失敗、URLパラメータのuserIdを使用:', err);
    });
}

window.addEventListener('load', function() {
  initLIFF(); // LIFFでuserIdを取得（失敗してもURLパラメータが残る）
  init();
  setupZoomPrevention(); // iOS 15+ ズーム防止
  setupKeyboardFix();
  setTimeout(function() {
    if (map) map.invalidateSize();
  }, 300);
});
</script>
